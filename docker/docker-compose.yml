networks:
  master-proxy-nw:
    name: master-proxy-nw

services:
# --- NETWORKING & REVERSE PROXY ---
  caddy:
    image: local-caddy-cloudflare
    container_name: caddy
    user: "${NWU_ID}:${NWU_ID}"
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CF_DNS_TOKEN}
      - DOMAIN=${DOMAIN}
      - EMAIL=${EMAIL}
    volumes:
      - ${NWU_HOME_DIR}/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${NWU_HOME_DIR}/caddy/data:/data
      - ${NWU_HOME_DIR}/caddy/config:/config
    networks:
      - master-proxy-nw

  cloudflared:
    image: cloudflare/cloudflared:${VER}
    container_name: cloudflared
    user: ${NWU_ID}:${NWU_ID}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_SECURE_TOKEN}
    networks:
      - master-proxy-nw

# --- LIGHTWEIGHT AUTH ---
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    user: "${NWU_ID}:${NWU_ID}"
    restart: unless-stopped
    volumes:
      - ${NWU_HOME_DIR}/authelia/config:/config
    networks:
      - master-proxy-nw
    environment:
      - TZ=${TZ}

# --- MANAGEMENT ---
  homepage:
    image: ghcr.io/gethomepage/homepage:${VER}
    container_name: homepage
    user: ${SERVERU_ID}:${SERVERU_ID}
    ports: 
      - 3000:3000
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=homepage.${DOMAIN}
    volumes:
      - ${SERVERU_HOME_DIR}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock 
    restart: unless-stopped
    networks:
      - master-proxy-nw

  filebrowser:
    image: filebrowser/filebrowser:${VER}
    container_name: filebrowser
    user: ${FILEU_ID}:${FILEU_ID}
    ports: 
      - 3100:80
    volumes:
      - ${STORAGE_DIR}:/srv/Media
      - ${SERVERU_HOME_DIR}/homepage/config:/srv/Server
      - ${FILEU_HOME_DIR}/filebrowser/database:/database
      - ${FILEU_HOME_DIR}/filebrowser/config:/config
    restart: unless-stopped
    networks:
      - master-proxy-nw

# --- STREAMING ---
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:${VER}
    user: ${STREAMU_ID}:${STREAMU_ID}
    ports:
      - 5000:8096 
    environment:
      - TZ=${TZ}
    volumes:
      - ${STREAMU_DIR}/jellyfin/config:/config
      - ${STREAMU_DIR}/jellyfin/cache:/cache
      - ${STORAGE_DIR}/Anime:/Anime:ro
      - ${STORAGE_DIR}/Movies:/movies:ro
      - ${STORAGE_DIR}/TV:/tv:ro
      - ${STORAGE_DIR}/Test:/Other:ro
    restart: unless-stopped
    networks:
      - master-proxy-nw

  kavita:
    container_name: kavita
    image: ghcr.io/kareadita/kavita:${VER}
    user: ${STREAMU_ID}:${STREAMU_ID}
    ports:
      - 5100:5000
    environment:
      - TZ=${TZ}
    volumes:
      - ${STREAMU_DIR}/kavita/config:/kavita/config
      - ${STORAGE_DIR}/Books:/data:ro
    restart: unless-stopped
    networks:
      - master-proxy-nw

  navidrome:
    image: deluan/navidrome:${VER}
    container_name: navidrome
    user: ${STREAMU_ID}:${STREAMU_ID}
    ports:
      - 5200:4533
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: ""
    volumes:
      - ${STREAMU_DIR}/navidrome:/data
      - ${STORAGE_DIR}/Music:/music:ro
      - ${STORAGE_DIR}/Podcasts:/podcasts:ro
    networks:
      - master-proxy-nw
    restart: unless-stopped

  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:${VER}
    user: ${STREAMU_ID}:${STREAMU_ID}
    ports:
      - 5300:80
    environment:
      - TZ=${TZ}
    volumes:
      - ${STREAMU_DIR}/audiobookshelf/config:/config
      - ${STREAMU_DIR}/audiobookshelf/metadata:/metadata
      - ${STORAGE_DIR}/Podcasts:/podcasts
    networks:
      - master-proxy-nw
    restart: unless-stopped

# --- VPN & TORRENTING ---
  gluetun:
    image: qmcgaw/gluetun:${VER}
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: always
    ports:
      - 8080:8080      # qBittorrent Web UI
      - 6881:6881      # qBittorrent peer tcp
      - 6881:6881/udp  # qBittorrent peer udp
      - 8200:8989      # Sonarr
      - 8000:8000      # Gluetun Control Server 
      - 8300:9117      # Jackett Web UI
      - 8400:5030      # slskd Web UI
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=Australia
      - HTTP_CONTROL_SERVER_ADDRESS=0.0.0.0:8000
      - HTTP_CONTROL_SERVER_LOG=on
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"apikey","apikey":"${GLUETUN_API}"}
      - DOT=on
      - DOT_PROVIDERS=cloudflare
    volumes:
      - ${NWU_HOME_DIR}/gluetun:/gluetun
    networks:
      - master-proxy-nw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='X-API-Key: ${GLUETUN_API}' http://127.0.0.1:8000/v1/publicip/ip || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    user: ${TORRENTU_ID}:${TORRENTU_ID}
    ports:
      - 4567:3000
    restart: unless-stopped
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
    networks:
      - master-proxy-nw

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${VER}
    container_name: qbittorrent
    user: ${TORRENTU_ID}:${TORRENTU_ID}
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - UMASK=002
    volumes:
      - ${TORRENTU_HOME_DIR}/qbittorrent/config:/config
      - ${STORAGE_DIR}/Torrents:/downloads
    restart: always

  sonarr:
    image: lscr.io/linuxserver/sonarr:${VER}
    container_name: sonarr
    user: ${TORRENTU_ID}:${TORRENTU_ID}
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TZ=${TZ}
    volumes:
      - ${TORRENTU_HOME_DIR}/sonarr/config:/config
      - ${STORAGE_DIR}/Completed:/tv
      - ${STORAGE_DIR}/Torrents:/downloads
    restart: always

  jackett:
    image: lscr.io/linuxserver/jackett:${VER}
    container_name: jackett
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${TORRENTU_ID}
      - PGID=${TORRENTU_ID}
      - TZ=${TZ}
    volumes:
      - ${TORRENTU_HOME_DIR}/jackett/config:/config
      - ${TORRENTU_HOME_DIR}/qbittorrent/downloads:/downloads
    restart: always

  slskd:
    image: slskd/slskd:${VER}
    container_name: slskd
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - SLSKD_REMOTE_CONFIGURATION=false
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_DOWNLOADS_DIR=/downloads
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
      - SLSKD_SHARES_DIRECTORIES__0=/music
      - PUID=${TORRENTU_ID}
      - PGID=${TORRENTU_ID}
      - TZ=${TZ}
    volumes:
      - ${TORRENTU_HOME_DIR}/slskd/config:/app
      - ${STORAGE_DIR}/Music:/music
      - ${STORAGE_DIR}/Torrents/slskd:/downloads
    restart: always

# --- PHOTO SERVER ---
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    user: ${PHOTOU_ID}:${PHOTOU_ID}
    ports:
      - 2000:2283
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - ${STORAGE_DIR}/ExternalPhotos:/external_photos
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - stack.env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    networks:
      - master-proxy-nw

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    user: ${PHOTOU_ID}:${PHOTOU_ID}
    volumes:
      - ${MODEL_CACHE_LOCATION}:/cache
      - ${ML_CONFIG_LOCATION}:/config
      - ${ML_DOT_CACHE}:/.cache
    env_file:
      - stack.env
    restart: always
    networks:
      - master-proxy-nw

  redis:
    container_name: immich_redis
    image: docker.io/redis:alpine
    user: ${PHOTOU_ID}:${PHOTOU_ID}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
    volumes:
      - ${REDIS_DATA_LOCATION}:/data
    restart: always
    networks:
      - master-proxy-nw

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    user: ${PHOTOU_ID}:${PHOTOU_ID}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d immich -U immich"]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      - master-proxy-nw

# --- SMART HOME ---
  homeassistant:
    container_name: Home-Assistant
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host 
    privileged: true 
    user: ${SERVERU_ID}:${SERVERU_ID}
    volumes:
      - ${SERVERU_HOME_DIR}/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro 
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome
    user: ${SERVERU_ID}:${SERVERU_ID}
    environment:
      - PLATFORMIO_CORE_DIR=/config/.platformio
      - UV_CACHE_DIR=/config/.cache/uv
      - ESPHOME_DASHBOARD_USE_PING=true
    volumes:
      - ${SERVERU_HOME_DIR}/esphome/config:/config
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    restart: always