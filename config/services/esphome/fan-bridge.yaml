esphome:
  name: fan-bridge
  friendly_name: Fan Bridge

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.154
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
ota:
  - platform: esphome

remote_transmitter:
  pin: GPIO26
  id: fan_transmitter
  carrier_duty_percent: 100%

# ---------------------------------------------------------
# LIGHT OUTPUTS (The RF Actions)
# ---------------------------------------------------------
output:
  - platform: template
    id: l_room_out
    type: binary
    write_action:
      - remote_transmitter.transmit_rc_switch_raw:
          code: '000011111110'
          protocol: 6
          repeat: {times: 10}
  
  - platform: template
    id: c_room_out
    type: binary
    write_action:
      - remote_transmitter.transmit_rc_switch_raw:
          code: '001001111110'
          protocol: 6
          repeat: {times: 10}

  - platform: template
    id: lounge_out
    type: binary
    write_action:
      - remote_transmitter.transmit_rc_switch_raw:
          code: '000101111110'
          protocol: 6
          repeat: {times: 10}

# ---------------------------------------------------------
# LIGHT ENTITIES
# ---------------------------------------------------------
light:
  - platform: binary
    name: "L Room Light"
    output: l_room_out
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "C Room Light"
    output: c_room_out
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "Lounge Light"
    output: lounge_out
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------------------------------------
# FAN ENTITIES
# ---------------------------------------------------------
# ---------------------------------------------------------
# FAN ENTITIES
# ---------------------------------------------------------
fan:
  # ROOM 1: L ROOM
  - platform: template
    name: "L Room Fan"
    id: l_fan
    speed_count: 3
    on_speed_set:
      - then:
          - if:
              condition: {lambda: 'return x == 3;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000011011111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 2;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000011101111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 1;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000011110111', protocol: 6, repeat: {times: 10}}
    on_turn_off:
      - then:
          - remote_transmitter.transmit_rc_switch_raw: {code: '000011111101', protocol: 6, repeat: {times: 10}}
          - lambda: 'id(l_fan).speed = 0;' # Force internal speed to 0

  # ROOM 2: C ROOM
  - platform: template
    name: "C Room Fan"
    id: c_fan
    speed_count: 3
    on_speed_set:
      - then:
          - if:
              condition: {lambda: 'return x == 3;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '001001011111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 2;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '001001101111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 1;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '001001110111', protocol: 6, repeat: {times: 10}}
    on_turn_off:
      - then:
          - remote_transmitter.transmit_rc_switch_raw: {code: '001001111101', protocol: 6, repeat: {times: 10}}
          - lambda: 'id(c_fan).speed = 0;' # Force internal speed to 0

  # ROOM 3: LOUNGE
  - platform: template
    name: "Lounge Fan"
    id: lounge_fan
    speed_count: 3
    on_speed_set:
      - then:
          - if:
              condition: {lambda: 'return x == 3;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000101011111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 2;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000101101111', protocol: 6, repeat: {times: 10}}
          - if:
              condition: {lambda: 'return x == 1;'}
              then:
                - remote_transmitter.transmit_rc_switch_raw: {code: '000101110111', protocol: 6, repeat: {times: 10}}
    on_turn_off:
      - then:
          - remote_transmitter.transmit_rc_switch_raw: {code: '000101111101', protocol: 6, repeat: {times: 10}}
          - lambda: 'id(lounge_fan).speed = 0;' # Force internal speed to 0