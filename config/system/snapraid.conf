# SnapRAID configuration

# Parity drive
parity /mnt/p1/snapraid.parity

# Content file
content /mnt/d1/.snapraid.content
content /mnt/d2/.snapraid.content

# Data drives
data d1 /mnt/d1
data d2 /mnt/d2

# Optional: excluded files/folders
# exclude *.tmp
exclude /lost+found/

# Optional: email notifications
# email to=you@example.com from=snapraid@example.com smtp=smtp.example.com
